name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Build firmware
      uses: P3TERX/Actions-OpenWrt@main
      env:
        OPENWRT_VER: immortalwrt-21.02
        FEEDS_CONF: feeds.conf.default
        CONFIG_FILE: .config
        DIY_P1_SH: diy-part1.sh
        DIY_P2_SH: diy-part2.sh
        UPLOAD_BIN_DIR: true